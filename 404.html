<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page not found — ʻĀina Atlas</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--orange:#f26b1a;--bg:#111216;--text:#e8e6e1;--muted:rgba(232,230,225,0.55)}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
  body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .wrap{max-width:520px}
  .code{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);font-weight:700}
  h1{margin-top:16px;font-size:clamp(28px,6vw,44px);line-height:1.12}
  p{margin-top:16px;color:var(--muted);font-size:16px;line-height:1.6}
  a.btn{display:inline-block;margin-top:28px;background:var(--orange);color:#111216;font-weight:700;text-decoration:none;padding:12px 22px;border-radius:10px}
  a.btn:hover{opacity:.9}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404 · Off the map</div>
    <h1>This parcel doesn’t exist.</h1>
    <p>The page you’re looking for moved or never existed. Head back to the atlas and pick up the trail.</p>
    <a class="btn" href="/">Back to ʻĀina Atlas</a>
  </div>
</body>
</html>
